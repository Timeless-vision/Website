<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Vision | Contact</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="floating-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>
    <nav class="navbar">
        <div class="logo">3D<span>Vision</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="courses.html">Courses</a></li>
            <li><a href="registration.html">Register</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
        <div class="menu-toggle"><i class="fas fa-bars"></i></div>
    </nav>

    <!-- Hero section with background image -->
    <section class="hero hero-contact">
        <div class="hero-content">
            <h1>Contact Us</h1>
            <p>We’d love to hear from you</p>
            <a href="#contact-form" class="btn btn-primary">Get in Touch</a>
        </div>
        <div class="hero-bg"></div>
    </section>

    <section id="contact-form" class="contact-section reveal">
        <div class="container">
            <div class="contact-grid">
                <div class="contact-info">
                    <h3>Get in Touch</h3>
                    <div class="info-item"><i class="fas fa-map-marker-alt"></i> 123 Innovation Drive, Silicon Valley, CA</div>
                    <div class="info-item"><i class="fas fa-phone"></i> +1 (800) 555-1234</div>
                    <div class="info-item"><i class="fas fa-envelope"></i> hello@3dvision.com</div>
                    <div class="social-links">
                        <a href="#"><i class="fab fa-twitter"></i></a>
                        <a href="#"><i class="fab fa-linkedin"></i></a>
                        <a href="#"><i class="fab fa-instagram"></i></a>
                    </div>
                </div>
                <div class="contact-form">
                    <form id="contactForm">
                        <div class="form-group">
                            <label for="contactName">Your Name *</label>
                            <input type="text" id="contactName" required>
                        </div>
                        <div class="form-group">
                            <label for="contactEmail">Email *</label>
                            <input type="email" id="contactEmail" required>
                        </div>
                        <div class="form-group">
                            <label for="contactMessage">Message *</label>
                            <textarea id="contactMessage" rows="5" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">Send Message</button>
                    </form>
                    <div id="contactFeedback" class="feedback"></div>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <div class="footer-content">
            <p>&copy; 2025 3D Vision. All rights reserved. | Designed with <i class="fas fa-heart"></i> for the future.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
